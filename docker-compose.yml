services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: org-escritorio-adv
      POSTGRES_PASSWORD: org-escritorio-adv
      POSTGRES_DB: org-escritorio-adv
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U org-escritorio-adv -d org-escritorio-adv"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/org-escritorio-adv
      KC_DB_USERNAME: org-escritorio-adv
      KC_DB_PASSWORD: org-escritorio-adv
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-setup:
    image: curlimages/curl:8.13.0
    depends_on:
      keycloak:
        condition: service_started
    volumes:
      - ./scripts/setup-keycloak.sh:/setup.sh:ro
    entrypoint: ["sh", "/setup.sh"]

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://org-escritorio-adv:org-escritorio-adv@postgres:5432/org-escritorio-adv
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: escritorio-adv
      KEYCLOAK_CLIENT_ID: backend-api
      KEYCLOAK_ADMIN_CLIENT_ID: backend-client
      KEYCLOAK_ADMIN_CLIENT_SECRET: gUHc20eRvmYZBKiMUSv0M5qa5A44x7ev
      DATAJUD_BASE_URL: ${DATAJUD_BASE_URL:-https://api-publica.datajud.cnj.jus.br}
      DATAJUD_API_KEY: ${DATAJUD_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL:-noreply@escritorio-adv.com.br}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-setup:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  selenium-chrome:
      image: selenium/standalone-chrome:latest
      ports:
        - "4444:4444"
        - "7900:7900"
      shm_size: 2gb
      extra_hosts:
        - "host.docker.internal:host-gateway"